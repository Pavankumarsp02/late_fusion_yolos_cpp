# /home/going/.config/tmuxinator/auto_start.yml

name: auto_start
root: ~/

windows:
  - editor:
      layout: tile
      panes:
        - pane1:
          - source /opt/ros/jazzy/setup.bash
          - cd ros2_ws3
          - source install/setup.bash
          - sleep 3 && ros2 launch ros2_yolos_cpp detector2.launch.py model_path:=src/ros2_yolos_cpp/yolov8n.onnx labels_path:=src/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_2/image
        - pane2:
          - source /opt/ros/jazzy/setup.bash
          - cd ros2_ws3
          - source install/setup.bash
          - ros2 launch ros2_yolos_cpp detector3.launch.py model_path:=src/ros2_yolos_cpp/yolov8n.onnx labels_path:=src/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_3/image
        - pane3:
          - source /opt/ros/jazzy/setup.bash
          - cd ros2_ws3
          - source install/setup.bash
          - ros2 launch ros2_yolos_cpp detector4.launch.py model_path:=src/ros2_yolos_cpp/yolov8n.onnx labels_path:=src/ros2_yolos_cpp/coco.names use_gpu:=true image_topic:=/lucid_vision/camera_4/image
        - pane4:
          - source /opt/ros/jazzy/setup.bash
          - cd ros2_ws3
          - source install/setup.bash
          - sleep 10
          - ros2 lifecycle set /yolos_detector3 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector2 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector4 configure
          - sleep 4 && ros2 lifecycle set /yolos_detector3 activate
          - sleep 4 && ros2 lifecycle set /yolos_detector2 activate
          - sleep 4 && ros2 lifecycle set /yolos_detector4 activate
        - pane5:
          - source /opt/ros/jazzy/setup.bash
          - cd ros2_ws3
          - source install/setup.bash
          - ros2 launch late_fusion_for_yolos_cpp launch_fusion_node.py
